<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantityMeasurement-App</title>
    <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      margin: 0;
    }

    .container {
      width: 70%;
      margin: 40px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(to right, #4a6cf7, #6a8dff);
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .section {
      padding: 20px;
    }

    .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }

    .types {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      padding: 15px;
      text-align: center;
      border-radius: 8px;
      background: #f3f3f3;
      cursor: pointer;
      transition: 0.3s;
    }

    .card.active {
      border: 2px solid #4a6cf7;
      background: #eaf0ff;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #e5e5e5;
      cursor: pointer;
    }

    .actions button.active {
      background: #4a6cf7;
      color: white;
    }

    .row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .input-box {
      flex: 1;
    }

    .input-box input, 
    .input-box select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .result {
      border: 2px solid #4a6cf7;
      padding: 15px;
      border-radius: 6px;
      color: #4a6cf7;
      font-size: 20px;
      font-weight: bold;
    }

    .center {
      text-align: center;
      margin: 10px 0;
    }
  </style>
</head>
<body>
    <div class="container">
        <div class="header">
            Welcome To QuantityMeasurementApp
        </div>
        <div class="section">
            <div class="label">Choose Type</div>
            <div class=" Types">
                <div class="card active">Length</div>
                <div class="card">Weight</div>
                <div class="card">Temprature</div>
                <div class="card">Volume</div>
            </div>

            <div class="label">Choose Action</div>
            <div class="action">
                <button class="active">Comparison</button>
                <button >Conversion</button>
                <button >Arithematic</button>
            </div>

            <div class="row">
                <div class="input-box">
                    <label >FROM</label>
                    <input type="number" name="" id="" value="1">
                    <select >
                        <option >Kilometer</option>
                        <option >Meter</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="input-box">
                    <label>VALUE 1</label>
                    <input type="number" value="1">
                    <select>
                        <option>Kilometer</option>
                    </select>
                </div>

                <div class="center">+</div>

                <div class="input-box">
                    <label>VALUE 2</label>
                    <input type="number" value="1">
                    <select>
                        <option>Meter</option>
                    </select>
                </div>
            </div>

            <div class="result">
                1.001 Kilometer
            </div>


        </div>
    </div>
</body>
</html>
